<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Dearen Kansil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body bgcolor="#000018" text="white" link="silver" vlink="gray" alink="silver">
    <canvas id="matrix-canvas"></canvas>
    <nav>
        <div class="nav-container">

            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="gallery.html">Galeri</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Kontak</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <br><br>

    <main>
        <h1>Galeri</h1>
        
        <section class="gallery-section">
            <h2>Foto Pribadi</h2>
            <div class="gallery-grid single-item">
                <div class="gallery-item fade-in">
                    <img src="Photo&vid/Motor.jpg" alt="Motor" loading="lazy">
                    <div class="gallery-overlay"></div>
                </div>
            </div>
        </section>
        
        <section class="gallery-section">
            <h2>Music Video/Hobi</h2>
            <div class="gallery-grid">
                <div class="gallery-item fade-in">
                    <video controls preload="metadata">
                        <source src="Photo&vid/drums.mp4" type="video/mp4">
                        Video drums tidak didukung.
                    </video>
                    <div class="gallery-overlay"></div>
                </div>
                
                <div class="gallery-item fade-in">
                    <video controls preload="metadata">
                        <source src="Photo&vid/ParamoreMyHearth.mp4" type="video/mp4">
                        Video gitar tidak didukung.
                    </video>
                    <div class="gallery-overlay"></div>
                </div>
                
                <div class="gallery-item fade-in">
                    <video controls preload="metadata">
                        <source src="Photo&vid/Cover.mp4" type="video/mp4">
                        Video tidak didukung.
                    </video>
                    <div class="gallery-overlay"></div>
            </div>
        </section>
        
        <section class="gallery-section">
            <h2>Foto Favorit</h2>
            <div class="gallery-grid single-item">
                <div class="gallery-item fade-in">
                    <img src="Photo&vid/Guitarist.jpeg" alt="Guitarist" loading="lazy">
                    <div class="gallery-overlay"></div>
                </div>
            </div>
        </section>
    </main>

    <br><br>

    <hr width="800">

    <script defer src="script.js"></script>
</body>
</html>
